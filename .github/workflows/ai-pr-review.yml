name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: >-
      !github.event.pull_request.draft &&
      !contains(github.event.pull_request.labels.*.name, 'skip-ai-review')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate custom provider configuration
        env:
          AI_REVIEW_API_KEY: ${{ secrets.AI_REVIEW_API_KEY }}
          AI_REVIEW_BASE_URL: ${{ vars.AI_REVIEW_BASE_URL }}
          AI_REVIEW_MODEL_STANDARD: ${{ vars.AI_REVIEW_MODEL_STANDARD }}
          AI_REVIEW_MODEL_PREMIUM: ${{ vars.AI_REVIEW_MODEL_PREMIUM }}
          FULL_REVIEW: ${{ contains(github.event.pull_request.labels.*.name, 'ai-review-full') }}
        shell: bash
        run: |
          missing=()
          [[ -n "$AI_REVIEW_API_KEY" ]] || missing+=("secret AI_REVIEW_API_KEY")
          [[ -n "$AI_REVIEW_BASE_URL" ]] || missing+=("variable AI_REVIEW_BASE_URL")
          [[ -n "$AI_REVIEW_MODEL_STANDARD" ]] || missing+=("variable AI_REVIEW_MODEL_STANDARD")
          if [[ "$FULL_REVIEW" == "true" && -z "$AI_REVIEW_MODEL_PREMIUM" ]]; then
            missing+=("variable AI_REVIEW_MODEL_PREMIUM (required for ai-review-full)")
          fi
          if (( ${#missing[@]} )); then
            printf 'Missing AI review configuration: %s\n' "$(IFS=', '; echo "${missing[*]}")" >&2
            exit 1
          fi

      - name: Run AI review
        # Pinned to tag1consulting/ai-pr-review v2.4.5.
        uses: tag1consulting/ai-pr-review/container-action@0a8b4f1ef1124b64e75e808bb90d4191113236f4
        with:
          image-tag: ${{ vars.AI_REVIEW_IMAGE_TAG || '2.4.5' }}
          provider: openai-compatible
          api-key: ${{ secrets.AI_REVIEW_API_KEY }}
          base-url: ${{ vars.AI_REVIEW_BASE_URL }}
          model-standard: ${{ vars.AI_REVIEW_MODEL_STANDARD }}
          model-premium: ${{ vars.AI_REVIEW_MODEL_PREMIUM || vars.AI_REVIEW_MODEL_STANDARD }}
          github-token: ${{ github.token }}
          pr-number: ${{ github.event.pull_request.number }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          review-mode: full
          max-diff-lines: ${{ vars.AI_REVIEW_MAX_DIFF_LINES || '5000' }}
          max-inline: ${{ vars.AI_REVIEW_MAX_INLINE || '25' }}
          max-tokens-per-agent: ${{ vars.AI_REVIEW_MAX_TOKENS_PER_AGENT || '8192' }}
          parallel: ${{ vars.AI_REVIEW_PARALLEL || 'true' }}
          enable-suggestions: ${{ vars.AI_REVIEW_ENABLE_SUGGESTIONS || 'true' }}
          context-enrichment: ${{ vars.AI_REVIEW_CONTEXT_ENRICHMENT || 'false' }}
          analyzers: ${{ vars.AI_REVIEW_ANALYZERS || '' }}
          exclude-analyzers: ${{ vars.AI_REVIEW_EXCLUDE_ANALYZERS || '' }}
          agents: ${{ vars.AI_REVIEW_AGENTS || '' }}
          exclude-agents: ${{ vars.AI_REVIEW_EXCLUDE_AGENTS || '' }}
